# ============================================
# myFireflyBlog — Nginx 配置独立部署
# ============================================
# 触发方式: GitHub Actions 页面手动触发 (workflow_dispatch)
#
# 用途: 单独更新 nginx 配置，不触发博客内容构建
# 流程: envsubst 替换模板变量 → SCP 上传 → nginx -t 测试 → nginx -s reload
#
# 前置条件 — 在 GitHub 仓库设置中添加以下 Secrets:
#   - SERVER_HOST: 服务器 IP (YOUR_SERVER_IP)
#   - SERVER_USERNAME: SSH 用户名 (YOUR_USER)
#   - SERVER_SSH_KEY: SSH 私钥内容
#   - BLOG_DOMAIN: 博客域名或服务器 IP (YOUR_SERVER_IP)
# ============================================

name: Deploy Nginx Config

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Nginx config template path'
        required: true
        default: 'server/nginx/default.conf.template'

jobs:
  deploy-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Substitute env vars
        env:
          BLOG_DOMAIN: ${{ secrets.BLOG_DOMAIN }}
        run: |
          mkdir -p server/nginx
          envsubst '${BLOG_DOMAIN}' < "${{ inputs.config_file }}" > server/nginx/default.conf
          echo "✅ Config generated:"
          cat server/nginx/default.conf

      - name: 📤 Upload config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server/nginx/default.conf"
          target: "/root/cc/myFireflyBlog/conf/"
          strip_components: 2
          rm: true

      - name: 🔄 Test & reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "🧪 测试 nginx 配置..."
            docker exec myFireflyBlog nginx -t

            echo "🔄 重新加载 nginx..."
            docker exec myFireflyBlog nginx -s reload

            echo "✅ Nginx 配置更新完成"
